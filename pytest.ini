[pytest]
# Configuration pytest pour pdf-dispatch
testpaths = tests
python_files = test_api.py test_webhook.py test_python_core.py
python_classes = Test
python_functions = test_

# Affichage verbeux par défaut
addopts = -v --tb=short

# Masquer les warnings pytest internes
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
