name: Build, test & publish

on:
  push:
    branches: [ main ]
    # Building on tag push means `git describe` resolves to the exact tag
    # (e.g. v1.2.0), so released images display a clean version string.
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history + tags so `git describe` can compute the version
          fetch-depth: 0

      - name: Compute version string
        id: version
        # git describe --tags --always yields:
        #   v1.1.1               on a tagged release commit
        #   v1.1.1-3-g58121e5    3 commits after the v1.1.1 tag (dev build)
        #   58121e5              short SHA if no tag exists yet
        run: echo "version=$(git describe --tags --always)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r splitter/requirements.txt

      - name: Security audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r splitter/requirements.txt --ignore-vuln PYSEC-2025-49
        continue-on-error: false

      - name: Python syntax check
        run: python3 -c "import ast; ast.parse(open('splitter/app.py').read()); print('OK')"

      - name: JS syntax check
        run: node --check splitter/static/js/app.js && echo OK

      - name: i18n key consistency
        run: python3 tests/test_i18n_keys.py

      - name: JS t() collision detector
        run: python3 tests/test_js_t_collision.py

      - name: Python core unit tests
        run: python3 tests/test_python_core.py

      - name: JS functional tests
        run: node tests/test_js_functional.js

      # ── Docker ───────────────────────────────────────────────────────────

      # QEMU provides CPU emulation so Buildx can build the linux/arm64 image
      # on the amd64 runner. All Python dependencies ship aarch64 wheels or
      # are pure Python, so no compilation happens under emulation and the
      # arm64 build stays fast.
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Docker requires image names to be lowercase.
      # github.repository_owner may be mixed-case, so we normalise it.
      #
      # The secondary tag uses the short commit SHA rather than a manually
      # maintained version number: it is the same source of truth as
      # APP_VERSION (injected into the image via ARG GIT_SHA, exposed by
      # /api/runtime). No separate file to keep in sync, and every build
      # gets a unique, traceable tag.
      - name: Normalise image name (lowercase owner)
        id: image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          VERSION="${GITHUB_SHA::8}"
          echo "owner=${OWNER}" >> $GITHUB_OUTPUT
          echo "name=ghcr.io/${OWNER}/pdf-dispatch" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Image: ghcr.io/${OWNER}/pdf-dispatch  Version: ${VERSION}"

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Two-stage build strategy:
      #   1. Build amd64 only, loaded into the local Docker daemon, so the
      #      smoke test below can actually run the container (`load: true`
      #      does not support multi-platform manifest lists).
      #   2. After the smoke test passes, build the multi-platform image and
      #      push it. The GHA cache makes stage 2 reuse all amd64 layers from
      #      stage 1, so only the arm64 layers are built there.
      - name: Build image (amd64, local) for smoke test
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
          build-args: |
            GIT_SHA=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — container starts and healthz responds
        run: |
          docker run -d --name test-splitter \
            -p 5000:5000 \
            -e DATA_DIR=/data \
            -e APP_VERSION="ci" \
            ${{ steps.image.outputs.name }}:latest
          sleep 15
          curl -f http://localhost:5000/healthz
          docker stop test-splitter

      - name: Build and push multi-platform image (amd64 + arm64)
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.version }}
          build-args: |
            GIT_SHA=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
